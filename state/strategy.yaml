version: "01"
strategy_name: "3-Step Price Action — Supply & Demand"

# Tunable parameters (Hermes changes ONE per reflection cycle)
entry:
  swing_n: 3                # n-bar pivot lookback for swing high/low detection
  impulse_threshold: 1.5    # candle range must be >= this x ATR to be an impulse
  impulse_body_ratio: 0.5   # candle body must be >= this fraction of range
  min_rr: 2.5               # minimum risk-to-reward ratio to take a trade
  zone_buffer_pct: 0.001    # SL buffer fraction beyond the zone edge
  zone_max_age_bars: 80     # ignore zones older than this many 5m bars (~6.7 hours)
